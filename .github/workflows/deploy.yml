name: Deploy with git hook

on:
  push:
    branches: [ main ]
  # Allows use to run it manually
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH Key Vocare Course All Keys
        uses: shimataro/ssh-key-action@v2.8.1
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: 'just-a-placeholder'
          if_key_exists: 'replace'

      - name: Adding Known Hosts Vocare Course main
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Deploy Vocare Course main
        run: |
          git remote add production_main vocare@${{ secrets.SSH_HOST }}:vocare_courses_production
          git push -f production_main main 
